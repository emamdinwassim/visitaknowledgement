<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Super Deals Mauritius Co Ltd - Hotel Management</title>
<style>
  /* --- General Reset & Fonts --- */
  * {
    box-sizing: border-box;
  }
  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0;
    background: #f5f7fa;
    color: #333;
    transition: background-color 0.4s ease, color 0.4s ease;
  }
  header {
    background-color: #004080;
    color: white;
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 {
    margin: 0; font-size: 1.6rem;
  }
  nav {
    display: flex;
    gap: 1rem;
  }
  .tab-btn {
    background: transparent;
    border: none;
    color: white;
    font-weight: 600;
    padding: 0.5rem 1rem;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: border-color 0.3s ease;
  }
  .tab-btn:hover, .tab-btn.active {
    border-bottom: 3px solid #ffcc00;
  }
  main {
    padding: 1rem 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  h2 {
    margin-top: 0;
  }
  .panel {
    display: none;
  }
  .panel.active {
    display: block;
  }
  /* --- Dashboard cards --- */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap: 1rem;
  }
  .card {
    background: white;
    padding: 1rem;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
    text-align: center;
  }
  .card h3 {
    margin: 0 0 0.3rem;
    font-size: 1.1rem;
    color: #004080;
  }
  .card .value {
    font-size: 1.8rem;
    font-weight: 700;
    color: #222;
  }

  /* --- Tables --- */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1rem;
  }
  th, td {
    padding: 0.5rem 0.8rem;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }
  th {
    background: #f0f4ff;
  }
  tr:hover {
    background: #f9fbff;
  }
  button {
    padding: 0.25rem 0.5rem;
    background: #004080;
    border: none;
    color: white;
    border-radius: 3px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #00264d;
  }
  /* --- Forms --- */
  form {
    margin-top: 1rem;
    background: white;
    padding: 1rem;
    border-radius: 8px;
    box-shadow: 0 1px 5px rgb(0 0 0 / 0.1);
  }
  label {
    display: block;
    margin: 0.6rem 0 0.3rem;
    font-weight: 600;
  }
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    border: 1px solid #ccc;
    font-size: 1rem;
  }
  textarea {
    resize: vertical;
  }
  /* --- Scrollable tables --- */
  .scrollable {
    max-height: 320px;
    overflow-y: auto;
    margin-top: 1rem;
  }

  /* Status badge colors */
  .status {
    padding: 0.15rem 0.5rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: capitalize;
  }
  .status-available { background: #d1e7dd; color: #0f5132; }
  .status-occupied { background: #f8d7da; color: #842029; }
  .status-maintenance { background: #fff3cd; color: #664d03; }
  .status-confirmed { background: #cfe2ff; color: #084298; }
  .status-cancelled { background: #f8d7da; color: #842029; }
  .status-active { background: #d1e7dd; color: #0f5132; }
  .status-off-duty { background: #e2e3e5; color: #41464b; }
  .status-on-leave { background: #fff3cd; color: #664d03; }
  .status-pending { background: #ffe5b4; color: #a65e00; }
  .status-completed { background: #c7f0db; color: #1a7f37; }

  /* --- Task management styles --- */
  #tasks .task-list {
    margin-top: 1rem;
  }
  #tasks .task-item {
    background: white;
    padding: 0.7rem 1rem;
    border-radius: 6px;
    margin-bottom: 0.8rem;
    box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #tasks .task-item span {
    font-weight: 600;
  }
  #tasks .task-item .due-date {
    font-style: italic;
    font-size: 0.9rem;
    color: #666;
  }
  #tasks .task-actions button {
    margin-left: 0.5rem;
  }

  /* Dark mode styles */
  body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
  }
  body.dark-mode header {
    background-color: #001f3f;
  }
  body.dark-mode table th {
    background-color: #222;
  }
  body.dark-mode table tr:hover {
    background-color: #333;
  }
  body.dark-mode table, 
  body.dark-mode th, 
  body.dark-mode td {
    border-color: #444;
  }
  body.dark-mode input, 
  body.dark-mode select, 
  body.dark-mode textarea {
    background-color: #222;
    color: #eee;
    border: 1px solid #555;
  }
  body.dark-mode button {
    background-color: #0066cc;
    color: white;
  }
  body.dark-mode button:hover {
    background-color: #004080;
  }
</style>
</head>
<body>
<header>
  <h1>Super Deals Mauritius Co Ltd</h1>
  <nav>
    <button class="tab-btn active" data-target="dashboard">Dashboard</button>
    <button class="tab-btn" data-target="bookings">Bookings</button>
    <button class="tab-btn" data-target="rooms">Rooms</button>
    <button class="tab-btn" data-target="staff">Staff</button>
    <button class="tab-btn" data-target="tasks">Tasks</button>
    <!-- Other tabs will come later -->
  </nav>
  <button id="darkModeToggle" title="Toggle Dark Mode" style="margin-left: 1rem; padding: 0.3rem 0.5rem;">🌙</button>
</header>

<main>
  <section id="dashboard" class="panel active">
    <h2>Dashboard</h2>
    <div class="cards">
      <div class="card">
        <h3>Total Bookings</h3>
        <div class="value" id="dash-total-bookings">0</div>
      </div>
      <div class="card">
        <h3>Rooms Available</h3>
        <div class="value" id="dash-rooms-available">0</div>
      </div>
      <div class="card">
        <h3>Staff On Duty</h3>
        <div class="value" id="dash-staff-on-duty">0</div>
      </div>
      <div class="card">
        <h3>Pending Tasks</h3>
        <div class="value" id="dash-pending-tasks">0</div>
      </div>
    </div>
  </section>

  <section id="bookings" class="panel">
    <h2>Manage Bookings</h2>
    <form id="bookingForm">
      <label for="guestName">Guest Name</label>
      <input type="text" id="guestName" name="guestName" required />

      <label for="guestEmail">Guest Email</label>
      <input type="email" id="guestEmail" name="guestEmail" required />

      <label for="guestPhone">Guest Phone</label>
      <input type="tel" id="guestPhone" name="guestPhone" required />

      <label for="roomSelect">Room</label>
      <select id="roomSelect" name="roomSelect" required></select>

      <label for="checkInDate">Check-in Date</label>
      <input type="date" id="checkInDate" name="checkInDate" required />

      <label for="checkOutDate">Check-out Date</label>
      <input type="date" id="checkOutDate" name="checkOutDate" required />

      <button type="submit">Add Booking</button>
    </form>
    <div class="scrollable">
      <table id="bookingsTable">
        <thead>
          <tr>
            <th>Guest Name</th>
            <th>Room</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Bookings rows here -->
        </tbody>
      </table>
    </div>
  </section>

  <section id="rooms" class="panel">
    <h2>Manage Rooms</h2>
    <form id="roomForm">
      <label for="roomNumber">Room Number</label>
      <input type="text" id="roomNumber" name="roomNumber" required />

      <label for="roomType">Room Type</label>
      <select id="roomType" name="roomType" required>
        <option value="">Select Type</option>
        <option value="Single">Single</option>
        <option value="Double">Double</option>
        <option value="Suite">Suite</option>
      </select>

      <label for="roomStatus">Status</label>
      <select id="roomStatus" name="roomStatus" required>
        <option value="available">Available</option>
        <option value="occupied">Occupied</option>
        <option value="maintenance">Maintenance</option>
      </select>

      <button type="submit">Add Room</button>
    </form>
    <div class="scrollable">
      <table id="roomsTable">
        <thead>
          <tr>
            <th>Room Number</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Rooms rows here -->
        </tbody>
      </table>
    </div>
  </section>

  <section id="staff" class="panel">
    <h2>Manage Staff</h2>
    <form id="staffForm">
      <label for="staffName">Name</label>
      <input type="text" id="staffName" name="staffName" required />

      <label for="staffRole">Role</label>
      <input type="text" id="staffRole" name="staffRole" required />

      <label for="staffStatus">Status</label>
      <select id="staffStatus" name="staffStatus" required>
        <option value="active">Active</option>
        <option value="off-duty">Off Duty</option>
        <option value="on-leave">On Leave</option>
      </select>

      <button type="submit">Add Staff</button>
    </form>
    <div class="scrollable">
      <table id="staffTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Staff rows here -->
        </tbody>
      </table>
    </div>
  </section>

  <section id="tasks" class="panel">
    <h2>Task Management</h2>
    <form id="taskForm">
      <label for="taskTitle">Task Title</label>
      <input type="text" id="taskTitle" name="taskTitle" required />

      <label for="taskAssignedTo">Assign To (Staff Name)</label>
      <select id="taskAssignedTo" name="taskAssignedTo" required></select>

      <label for="taskDueDate">Due Date</label>
      <input type="date" id="taskDueDate" name="taskDueDate" required />

      <label for="taskStatus">Status</label>
      <select id="taskStatus" name="taskStatus" required>
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>

      <button type="submit">Add Task</button>
    </form>
    <div class="task-list" id="taskList">
      <!-- Task items here -->
    </div>
  </section>
</main>

<script>
  // Data stores
  let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
  let rooms = JSON.parse(localStorage.getItem('rooms')) || [];
  let staff = JSON.parse(localStorage.getItem('staff')) || [];
  let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

  // Tab navigation logic
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.panel');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));

      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');

      // Special updates if needed
      if(tab.dataset.target === 'tasks') updateTaskAssignedToSelect();
      if(tab.dataset.target === 'bookings') updateRoomSelect();
    });
  });

  // Dark Mode toggle
  const darkToggle = document.getElementById('darkModeToggle');
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
  });

  // Utility: Save all data to localStorage
  function saveAllData() {
    localStorage.setItem('bookings', JSON.stringify(bookings));
    localStorage.setItem('rooms', JSON.stringify(rooms));
    localStorage.setItem('staff', JSON.stringify(staff));
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  // ------- Bookings Management --------
  const bookingForm = document.getElementById('bookingForm');
  const bookingsTableBody = document.querySelector('#bookingsTable tbody');
  const roomSelect = document.getElementById('roomSelect');

  function updateRoomSelect() {
    roomSelect.innerHTML = '';
    rooms.forEach(room => {
      if(room.status === 'available') {
        const opt = document.createElement('option');
        opt.value = room.roomNumber;
        opt.textContent = `${room.roomNumber} (${room.roomType})`;
        roomSelect.appendChild(opt);
      }
    });
  }

  bookingForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const newBooking = {
      id: Date.now(),
      guestName: bookingForm.guestName.value.trim(),
      guestEmail: bookingForm.guestEmail.value.trim(),
      guestPhone: bookingForm.guestPhone.value.trim(),
      roomNumber: bookingForm.roomSelect.value,
      checkInDate: bookingForm.checkInDate.value,
      checkOutDate: bookingForm.checkOutDate.value,
      status: 'confirmed'
    };

    bookings.push(newBooking);
    // Mark room as occupied
    const room = rooms.find(r => r.roomNumber === newBooking.roomNumber);
    if(room) room.status = 'occupied';

    saveAllData();
    renderBookings();
    renderRooms();
    updateRoomSelect();
    bookingForm.reset();
    updateDashboard();
  });

  function renderBookings() {
    bookingsTableBody.innerHTML = '';
    bookings.forEach(b => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${b.guestName}</td>
        <td>${b.roomNumber}</td>
        <td>${b.checkInDate}</td>
        <td>${b.checkOutDate}</td>
        <td><span class="status status-confirmed">${b.status}</span></td>
        <td>
          <button onclick="cancelBooking(${b.id})" title="Cancel Booking">Cancel</button>
        </td>
      `;
      bookingsTableBody.appendChild(tr);
    });
  }

  function cancelBooking(id) {
    const idx = bookings.findIndex(b => b.id === id);
    if(idx !== -1) {
      // Mark room available again
      const room = rooms.find(r => r.roomNumber === bookings[idx].roomNumber);
      if(room) room.status = 'available';

      bookings.splice(idx,1);
      saveAllData();
      renderBookings();
      renderRooms();
      updateRoomSelect();
      updateDashboard();
    }
  }

  // -------- Rooms Management --------
  const roomForm = document.getElementById('roomForm');
  const roomsTableBody = document.querySelector('#roomsTable tbody');

  roomForm.addEventListener('submit', e => {
    e.preventDefault();
    const newRoom = {
      id: Date.now(),
      roomNumber: roomForm.roomNumber.value.trim(),
      roomType: roomForm.roomType.value,
      status: roomForm.roomStatus.value
    };
    // Prevent duplicates
    if(rooms.some(r => r.roomNumber === newRoom.roomNumber)) {
      alert('Room number already exists!');
      return;
    }
    rooms.push(newRoom);
    saveAllData();
    renderRooms();
    updateRoomSelect();
    roomForm.reset();
    updateDashboard();
  });

  function renderRooms() {
    roomsTableBody.innerHTML = '';
    rooms.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${r.roomNumber}</td>
        <td>${r.roomType}</td>
        <td><span class="status status-${r.status}">${r.status}</span></td>
        <td>
          <button onclick="deleteRoom(${r.id})" title="Delete Room">Delete</button>
        </td>
      `;
      roomsTableBody.appendChild(tr);
    });
  }

  function deleteRoom(id) {
    const idx = rooms.findIndex(r => r.id === id);
    if(idx !== -1) {
      // Check if room is booked - prevent deletion if booked
      const booked = bookings.some(b => b.roomNumber === rooms[idx].roomNumber);
      if(booked) {
        alert('Cannot delete room that has active bookings!');
        return;
      }
      rooms.splice(idx,1);
      saveAllData();
      renderRooms();
      updateRoomSelect();
      updateDashboard();
    }
  }

  // ------- Staff Management --------
  const staffForm = document.getElementById('staffForm');
  const staffTableBody = document.querySelector('#staffTable tbody');

  staffForm.addEventListener('submit', e => {
    e.preventDefault();
    const newStaff = {
      id: Date.now(),
      name: staffForm.staffName.value.trim(),
      role: staffForm.staffRole.value.trim(),
      status: staffForm.staffStatus.value
    };
    staff.push(newStaff);
    saveAllData();
    renderStaff();
    updateTaskAssignedToSelect();
    staffForm.reset();
    updateDashboard();
  });

  function renderStaff() {
    staffTableBody.innerHTML = '';
    staff.forEach(s => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${s.name}</td>
        <td>${s.role}</td>
        <td><span class="status status-${s.status.replace(/\s/g,'-')}">${s.status}</span></td>
        <td>
          <button onclick="deleteStaff(${s.id})" title="Delete Staff">Delete</button>
        </td>
      `;
      staffTableBody.appendChild(tr);
    });
  }

  function deleteStaff(id) {
    const idx = staff.findIndex(s => s.id === id);
    if(idx !== -1) {
      // Prevent deletion if assigned to pending/in-progress tasks
      const assignedTasks = tasks.some(t => t.assignedTo === staff[idx].name && (t.status === 'pending' || t.status === 'in-progress'));
      if(assignedTasks) {
        alert('Cannot delete staff assigned to active tasks!');
        return;
      }
      staff.splice(idx,1);
      saveAllData();
      renderStaff();
      updateTaskAssignedToSelect();
      updateDashboard();
    }
  }

  // ------ Task Management ---------
  const taskForm = document.getElementById('taskForm');
  const taskList = document.getElementById('taskList');
  const taskAssignedToSelect = document.getElementById('taskAssignedTo');

  function updateTaskAssignedToSelect() {
    taskAssignedToSelect.innerHTML = '';
    staff.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      taskAssignedToSelect.appendChild(opt);
    });
  }

  taskForm.addEventListener('submit', e => {
    e.preventDefault();
    const newTask = {
      id: Date.now(),
      title: taskForm.taskTitle.value.trim(),
      assignedTo: taskForm.taskAssignedTo.value,
      dueDate: taskForm.taskDueDate.value,
      status: taskForm.taskStatus.value
    };
    tasks.push(newTask);
    saveAllData();
    renderTasks();
    taskForm.reset();
    updateDashboard();
  });

  function renderTasks() {
    taskList.innerHTML = '';
    tasks.forEach(t => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = `
        <strong>${t.title}</strong> - Assigned to: ${t.assignedTo} - Due: ${t.dueDate} - Status: <span class="status status-${t.status.replace(/\s/g,'-')}">${t.status}</span>
        <button onclick="deleteTask(${t.id})" title="Delete Task">Delete</button>
      `;
      taskList.appendChild(div);
    });
  }

  function deleteTask(id) {
    const idx = tasks.findIndex(t => t.id === id);
    if(idx !== -1) {
      tasks.splice(idx,1);
      saveAllData();
      renderTasks();
      updateDashboard();
    }
  }

  // -------- Dashboard Update --------
  const dashboardStats = document.getElementById('dashboardStats');

  function updateDashboard() {
    const totalRooms = rooms.length;
    const availableRooms = rooms.filter(r => r.status === 'available').length;
    const occupiedRooms = rooms.filter(r => r.status === 'occupied').length;
    const totalBookings = bookings.length;
    const confirmedBookings = bookings.filter(b => b.status === 'confirmed').length;
    const totalStaff = staff.length;
    const activeStaff = staff.filter(s => s.status === 'active').length;
    const pendingTasks = tasks.filter(t => t.status === 'pending').length;
    const inProgressTasks = tasks.filter(t => t.status === 'in-progress').length;
    const completedTasks = tasks.filter(t => t.status === 'completed').length;

    dashboardStats.innerHTML = `
      <div>Total Rooms: ${totalRooms}</div>
      <div>Available Rooms: ${availableRooms}</div>
      <div>Occupied Rooms: ${occupiedRooms}</div>
      <div>Total Bookings: ${totalBookings}</div>
      <div>Confirmed Bookings: ${confirmedBookings}</div>
      <div>Total Staff: ${totalStaff}</div>
      <div>Active Staff: ${activeStaff}</div>
      <div>Pending Tasks: ${pendingTasks}</div>
      <div>In Progress Tasks: ${inProgressTasks}</div>
      <div>Completed Tasks: ${completedTasks}</div>
    `;
  }

  // Initial render calls
  renderRooms();
  renderBookings();
  renderStaff();
  renderTasks();
  updateRoomSelect();
  updateTaskAssignedToSelect();
  updateDashboard();
</script>
